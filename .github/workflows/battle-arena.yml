name: Battle Arena

on:
  repository_dispatch:
    types: [challenge]
  workflow_dispatch:
    inputs:
      opponent_repo:
        description: '对手仓库 (owner/repo)'
        required: true
      attack_sequence:
        description: '攻击技能序列 (逗号分隔)'
        required: false
        default: 'scan,buffer_overflow,refactor_storm'

jobs:
  battle:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Download opponent pet.soul
        env:
          OPPONENT_REPO: ${{ github.event.client_payload.opponent_repo || inputs.opponent_repo }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 从对手仓库下载 pet.soul
          OPPONENT_RAW_URL="https://raw.githubusercontent.com/${OPPORTUNITY_REPO}/main/.monster/pet.soul"
          curl -L -o opponent_pet.soul "$OPPONENT_RAW_URL" || echo "{}" > opponent_pet.soul

      - name: Run battle simulation
        run: |
          # 运行战斗模拟
          ATTACK_SEQUENCE=$(echo "${{ github.event.client_payload.attack_sequence || inputs.attack_sequence }}" | tr ',' ' ')
          python monster.py duel "$OPPORTUNITY_REPO" --attacks $ATTACK_SEQUENCE > battle-result.json

      - name: Generate battle report
        run: |
          # 生成战斗报告
          python -c "
          import json
          from datetime import datetime

          with open('battle-result.json') as f:
              result = json.load(f)

          report = {
              'timestamp': datetime.now().isoformat(),
              'challenger': '${{ github.repository }}',
              'opponent': '${{ github.event.client_payload.opponent_repo || inputs.opponent_repo }}',
              'winner': result.get('winner', 'unknown'),
              'turns': result.get('turns', 0),
              'battle_log': result.get('battle_log', [])
          }

          with open('battle-reports/latest.json', 'w') as f:
              json.dump(report, f, indent=2)
          "

      - name: Create battle report branch
        run: |
          git checkout -b battle-report/$(date +%Y%m%d-%H%M%S)

      - name: Commit battle report
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p battle-reports
          git add -A
          git commit -m "⚔️ Battle report: vs ${{ github.event.client_payload.opponent_repo || inputs.opponent_repo }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: '⚔️ Battle Report - ${{ github.event.client_payload.opponent_repo || inputs.opponent_repo }}'
          body: |
            ## 战斗报告

            对手：${{ github.event.client_payload.opponent_repo || inputs.opponent_repo }}
            时间：$(date -u +%Y-%m-%dT%H:%M:%SZ)

            查看详细战斗日志：`battle-reports/latest.json`
          branch: battle-report/auto
          delete-branch: true
