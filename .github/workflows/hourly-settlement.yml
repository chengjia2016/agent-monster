name: Hourly Settlement

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行
  workflow_dispatch:

jobs:
  settlement:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Scan for cookies
        id: scan
        run: |
          python cookie.py scan . ${{ github.repository_owner }} > food-bank.json
          echo "cookies_found=$(jq '.summary.total' food-bank.json)" >> $GITHUB_OUTPUT

      - name: Process food bank
        run: |
          echo "Processing ${.steps.scan.outputs.cookies_found} cookies..."
          # 这里会调用 monster.py 来给宠物添加能量

      - name: Update pet status
        run: |
          # 更新宠物状态
          python monster.py analyze --days 1

      - name: Commit changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🍪 Auto: Hourly settlement - ${steps.scan.outputs.cookies_found} cookies"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
