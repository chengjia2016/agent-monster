name: Monster Referee
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'battle-report.json'
      - '**/pet.soul'
  workflow_dispatch:

jobs:
  verify-battle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract battle report
        id: extract
        run: |
          if [ -f "battle-report.json" ]; then
            echo "has_report=true" >> $GITHUB_OUTPUT
            echo "report_content=$(cat battle-report.json)" >> $GITHUB_OUTPUT
          else
            echo "has_report=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Verify signature
        if: steps.extract.outputs.has_report == 'true'
        run: |
          echo "Verifying GPG signature..."
      
      - name: Verify deterministic seed
        if: steps.extract.outputs.has_report == 'true'
        run: |
          echo "Verifying seed calculation..."
          
      - name: Update monster badge
        if: steps.extract.outputs.has_report == 'true'
        run: |
          echo "Updating README badge..."
          
      - name: Comment result
        if: steps.extract.outputs.has_report == 'true'
        run: |
          echo "Commenting on PR..."