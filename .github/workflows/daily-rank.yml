name: Daily Rank

on:
  schedule:
    - cron: '0 0 * * *'  # 每天午夜 UTC
  workflow_dispatch:

jobs:
  rank:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Calculate daily rank
        id: rank
        run: |
          python monster.py status --json > pet-status.json

          # 计算当日贡献
          commits_today=$(git log --since="24 hours ago" --oneline | wc -l)
          echo "commits_today=$commits_today" >> $GITHUB_OUTPUT

          # 计算等级
          level=$(jq '.level' pet-status.json)
          echo "level=$level" >> $GITHUB_OUTPUT

      - name: Update leaderboard
        run: |
          # 更新个人排行榜
          cat > leaderboard.json << EOF
          {
            "player": "${{ github.repository_owner }}",
            "pet_name": "$(jq -r '.name' pet-status.json)",
            "level": ${{ steps.rank.outputs.level }},
            "commits_today": ${{ steps.rank.outputs.commits_today }},
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📊 Auto: Daily rank update - Level ${{ steps.rank.outputs.level }}"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
